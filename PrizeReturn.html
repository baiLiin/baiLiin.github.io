<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>累储奖励计算器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #4CAF50;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 6px;
            min-height: 150px;
            border-left: 4px solid #4CAF50;
        }
        .result h3 {
            margin-top: 0;
            color: #333;
        }
        .result-content {
            line-height: 1.6;
            color: #555;
        }
        .package-name {
            font-weight: bold;
            color: #4CAF50;
            margin: 10px 0;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>玩家累储奖励计算器</h1>
        <div class="input-group">
            <label for="money">累储金额（美元）：</label>
            <input type="number" id="money" step="0.01" min="0" placeholder="请输入金额" value="1000">
        </div>
        <button onclick="calculatePrize()">计算奖励</button>
        <div class="result">
            <h3>奖励结果：</h3>
            <div class="result-content" id="result">请输入金额并点击计算按钮</div>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 累储奖励计算器</p>
    </div>

    <script>
        function calculatePrize() {
            const moneyInput = document.getElementById('money');
            const resultDiv = document.getElementById('result');
            const money = parseFloat(moneyInput.value);

            if (isNaN(money) || money < 0) {
                resultDiv.innerHTML = "输入格式错误，请输入非负数字！";
                return;
            }

            let result = "";
            if (money >= 0 && money <= 99) {
                result = "仅发放道具礼包，无珍珠补偿<br><br>";
                result += '<div class="package-name">为玩家发送启航助力礼包</div><br>';
                result += "50,000蓝钻<br>锻造材料自选包*10<br>魂器材料自选包*10<br>养成材料自选包*5<br>战力提升自选包*2";
            } else if (money > 99 && money <= 499) {
                const pearl = money * 100 * 0.1;
                result = `为玩家发送${pearl}珍珠<br><br>`;
                result += '<div class="package-name">为玩家发送进阶勇士礼包</div><br>';
                result += "200,000蓝钻<br>锻造材料自选包*30<br>魂器材料自选包*30<br>养成材料自选包*10<br>战力提升自选包*5<br>珍惜材料自选包*3<br>羽毛*1";
            } else if (money > 499 && money <= 999) {
                const pearl = money * 100 * 0.2;
                result = `为玩家发送${pearl}珍珠<br><br>`;
                result += '<div class="package-name">为玩家发送豪华精英礼包</div><br>';
                result += "400,000蓝钻<br>锻造材料自选包*50<br>魂器材料自选包*50<br>养成材料自选包*20<br>战力提升自选包*10<br>珍惜材料自选包*10<br>洛克之羽*1";
            } else if (money > 999 && money <= 2999) {
                const pearl = money * 100 * 0.3;
                result = `为玩家发送${pearl}珍珠<br><br>`;
                result += '<div class="package-name">为玩家发送史诗领主礼包</div><br>';
                result += "1,000,000蓝钻<br>锻造材料自选包*120<br>魂器材料自选包*120<br>养成材料自选包*60<br>战力提升自选包*30<br>珍惜材料自选包*20<br>羽毛自选箱*1";
            } else if (money > 2999 && money <= 30000) {
                const pearl = money * 100 * 0.5;
                result = `为玩家发送${pearl}珍珠<br><br>`;
                result += '<div class="package-name">为玩家发送至尊王者礼包</div><br>';
                result += "2,000,000蓝钻<br>锻造材料自选包*300<br>魂器材料自选包*300<br>养成材料自选包*120<br>战力提升自选包*60<br>珍惜材料自选包*30<br>羽毛自选箱*2<br>专属红色称号<br>专属客服";
            } else {
                result = "超出最高累储金额范围，暂无额外奖励！";
            }

            resultDiv.innerHTML = result;
        }

        // 页面加载时自动计算示例值
        window.onload = function() {
            calculatePrize();
        };
    </script>
</body>
</html>
